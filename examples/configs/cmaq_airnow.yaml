# Example DAVINCI-MONET Configuration
# CMAQ dataset evaluation against AirNow surface datasets

analysis:
  start_time: "2024-07-01"
  end_time: "2024-07-31"
  output_dir: ./output
  debug: false

sources:
  cmaq_v54:
    type: cmaq
    files: /data/cmaq/2024/07/CCTM_CONC_*.nc
    files_vert: /data/cmaq/2024/07/METCRO3D_*.nc
    radius_of_influence: 12000    variables:
      O3:
        ylabel_plot: "O3 (ppbv)"
        vmin_plot: 0
        vmax_plot: 100
        vdiff_plot: 30
      PM25_TOT:
        ylabel_plot: "PM2.5 (ug/m3)"
        vmin_plot: 0
        vmax_plot: 50
        vdiff_plot: 20

  airnow:
    type: airnow
    filename: /data/geometry/AirNow_202407.nc
    variables:
      o3:
        geometry_min: 0
        geometry_max: 200
      pm25:
        geometry_min: 0
        geometry_max: 500
      no2:
        geometry_min: 0
        geometry_max: 100
      co:
        geometry_min: 0
        geometry_max: 10

# One binary pair per variable. The plots below geometry cmaq_v54_airnow (O3).
pairs:
  cmaq_v54_airnow:
    sources: [cmaq_v54, airnow]
    geometry: airnow
    variables:
      cmaq_v54: O3
      airnow: o3

  cmaq_v54_airnow_pm25:
    sources: [cmaq_v54, airnow]
    geometry: airnow
    variables:
      cmaq_v54: PM25_TOT
      airnow: pm25

plots:
  timeseries_o3:
    type: timeseries
    domain_type: [all]
    domain_name: [CONUS]
    data: [cmaq_v54_airnow]
    data_proc:
      ts_avg_window: "D"  # Daily averaging

  scatter_o3:
    type: scatter
    domain_type: [all]
    domain_name: [CONUS]
    data: [cmaq_v54_airnow]

  diurnal_o3:
    type: diurnal
    domain_type: [all]
    domain_name: [CONUS]
    data: [cmaq_v54_airnow]

  spatial_bias_o3:
    type: spatial_bias
    domain_type: [all]
    domain_name: [CONUS]
    data: [cmaq_v54_airnow]

  taylor_diagram:
    type: taylor
    domain_type: [all]
    domain_name: [CONUS]
    data: [cmaq_v54_airnow]

stats:
  output_table: true
  output_table_kwargs:
    precision: 3
  metrics:
    - N
    - MG
    - MD
    - MB
    - RMSE
    - R
    - NMB
    - NME
    - IOA
