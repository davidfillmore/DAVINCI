name: davinci
channels:
  - conda-forge
  - defaults
dependencies:
  # Python version
  - python=3.11

  # Core scientific stack (via melodies-monet)
  - melodies-monet

  # Additional I/O support
  - pyhdf  # HDF4/HDF-EOS for MODIS
  - wrf-python  # WRF/WRF-Chem reader (used by monetio for mech-aware decoding)

  # Progress display
  - tqdm
  - rich

  # Development tools
  - pytest
  - pytest-cov
  - mypy
  - black
  - isort

  # Install davinci-monet in editable mode
  - pip
  - pip:
    - anthropic>=0.40
    - xeofs>=2.3,<3
    - -e ".[dev]"
