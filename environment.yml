name: davinci-monet
channels:
  - conda-forge
  - defaults
dependencies:
  # Python version
  - python=3.11

  # Core scientific stack (via melodies-monet)
  - melodies-monet

  # Additional I/O support
  - earthaccess  # NASA Earthdata cloud/download
  - geopandas  # Geospatial vector data (shapefiles, GeoJSON)
  - pyhdf  # HDF4/HDF-EOS for MODIS

  # Progress display
  - tqdm
  - rich

  # Development tools
  - pytest
  - pytest-cov
  - mypy
  - black
  - isort

  # Install davinci-monet in editable mode
  - pip
  - pip:
    - -e ".[dev]"
    - anthropic>=0.40
    - paho-mqtt>=2.0
