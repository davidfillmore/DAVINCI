# ASIA-AQ CESM/CAM-chem Evaluation - DC-8 Aircraft Only
# O3, NO2, CO from DC-8 aircraft (10-second merge files)
#
# Model: CESM/CAM-chem (f.e3b06m.FCnudged.t6s.01x01.01)
# Period: February 1-29, 2024 (leap year)
# Domain: 0-45°N, 90-140°E
#
# Fast run: single obs dataset avoids repeated Dask model loading

analysis:
  start_time: "2024-02-01"
  end_time: "2024-02-29"
  output_dir: /glade/work/fillmore/DAVINCI-MONET/analyses/asia-aq/output
  log_dir: /glade/work/fillmore/DAVINCI-MONET/analyses/asia-aq/logs
  debug: false

  city_labels:
    Beijing: [39.9, 116.4]
    Seoul: [37.5, 127.0]
    Tokyo: [35.7, 139.7]
    Shanghai: [31.2, 121.5]
    Manila: [14.6, 121.0]
    Bangkok: [13.75, 100.5]
    Hanoi: [21.0, 105.85]
    Singapore: [1.35, 103.8]
    Kuala Lumpur: [3.15, 101.7]
    Hong Kong: [22.3, 114.2]

model:
  cesm_asiaq:
    mod_type: generic
    files: /glade/derecho/scratch/fillmore/ASIA-AQ/model/f.e3b06m.FCnudged.t6s.01x01.01.cam.h2i.2024-02-*.nc
    radius_of_influence: 15000

    mapping:
      dc8:
        O3_ROZE_STCLAIR: O3
        NO2_CANOE_STCLAIR: NO2
        CO_DACOM_DISKIN: CO

    variables:
      O3:
        unit_scale: 1.0e9
        units: ppb
        ylabel_plot: "O$_3$ (ppb)"
        vmin_plot: 0
        vmax_plot: 100
        vdiff_plot: 30
      NO2:
        unit_scale: 1.0e9
        units: ppb
        ylabel_plot: "NO$_2$ (ppb)"
        vmin_plot: 0
        vmax_plot: 50
        vdiff_plot: 20
      CO:
        unit_scale: 1.0e9
        units: ppb
        ylabel_plot: "CO (ppb)"
        vmin_plot: 0
        vmax_plot: 1000
        vdiff_plot: 200

obs:
  dc8:
    obs_type: aircraft
    filename: /glade/derecho/scratch/fillmore/ASIA-AQ/obs/asiaaq-mrg10_dc8_202402*_RA_*.ict
    variables:
      O3_ROZE_STCLAIR:
        obs_min: 0
        obs_max: 200
        units: ppb
        ylabel_plot: "O$_3$ (ppb)"
        display_name: "O$_3$ (ROZE)"
      NO2_CANOE_STCLAIR:
        unit_scale: 0.001  # pptv to ppbv
        obs_min: 0
        obs_max: 50
        units: ppb
        ylabel_plot: "NO$_2$ (ppb)"
        display_name: "NO$_2$ (CANOE)"
      CO_DACOM_DISKIN:
        obs_min: 0
        obs_max: 500
        units: ppb
        ylabel_plot: "CO (ppb)"
        display_name: "CO (DACOM)"

pairs:
  cesm_dc8_o3:
    model: cesm_asiaq
    obs: dc8
    variable:
      model_var: O3
      obs_var: O3_ROZE_STCLAIR

  cesm_dc8_no2:
    model: cesm_asiaq
    obs: dc8
    variable:
      model_var: NO2
      obs_var: NO2_CANOE_STCLAIR

  cesm_dc8_co:
    model: cesm_asiaq
    obs: dc8
    variable:
      model_var: CO
      obs_var: CO_DACOM_DISKIN

plots:
  dc8_o3_scatter:
    type: scatter
    pairs: [cesm_dc8_o3]
    title: "O3: CESM vs DC-8 Aircraft"

  dc8_no2_scatter:
    type: scatter
    pairs: [cesm_dc8_no2]
    title: "NO2: CESM vs DC-8 Aircraft"

  dc8_co_scatter:
    type: scatter
    pairs: [cesm_dc8_co]
    title: "CO: CESM vs DC-8 Aircraft"

  dc8_o3_flight_timeseries:
    type: flight_timeseries
    pairs: [cesm_dc8_o3]
    title: "O3 Flight-by-Flight: CESM vs DC-8"
    ncols: 4
    min_points: 10

  dc8_no2_flight_timeseries:
    type: flight_timeseries
    pairs: [cesm_dc8_no2]
    title: "NO2 Flight-by-Flight: CESM vs DC-8"
    ncols: 4
    min_points: 10

  dc8_co_flight_timeseries:
    type: flight_timeseries
    pairs: [cesm_dc8_co]
    title: "CO Flight-by-Flight: CESM vs DC-8"
    ncols: 4
    min_points: 10

  dc8_o3_track_3d:
    type: track_map_3d
    pairs: [cesm_dc8_o3]
    title: "O3 Bias: DC-8 3D Flight Track"
    show_var: bias
    elev: 25
    azim: -60

  dc8_no2_track_3d:
    type: track_map_3d
    pairs: [cesm_dc8_no2]
    title: "NO2 Bias: DC-8 3D Flight Track"
    show_var: bias
    elev: 25
    azim: -60

  dc8_co_track_3d:
    type: track_map_3d
    pairs: [cesm_dc8_co]
    title: "CO Bias: DC-8 3D Flight Track"
    show_var: bias
    elev: 25
    azim: -60

stats:
  output_table: true
  output_table_kwargs:
    precision: 3
  metrics: [N, MO, MP, MB, RMSE, R, NMB, NME, IOA]
