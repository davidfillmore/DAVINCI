# ASIA-AQ CESM/CAM-chem Evaluation Configuration (Derecho)
# Full configuration with all observation datasets
#
# Model: CESM/CAM-chem (f.e3b06m.FCnudged.t6s.01x01.01)
# Period: February 1-29, 2024 (leap year)
# Domain: 0-45°N, 90-140°E
#
# Data location: /glade/derecho/scratch/fillmore/ASIA-AQ (fast parallel FS)
#
# For faster runs, use single-obs configs:
#   - asia-aq-airnow-derecho.yaml   (surface PM2.5, O3)
#   - asia-aq-aeronet-derecho.yaml  (AOD)
#   - asia-aq-dc8-derecho.yaml      (aircraft O3, NO2, CO)
#   - asia-aq-pandora-derecho.yaml  (NO2 column)

analysis:
  start_time: "2024-02-01"
  end_time: "2024-02-29"
  output_dir: /glade/work/fillmore/DAVINCI-MONET/analyses/asia-aq/output
  log_dir: /glade/work/fillmore/DAVINCI-MONET/analyses/asia-aq/logs
  debug: false
  style:
    theme: ncar
    context: default

  # City labels for spatial plots: {name: [lat, lon]}
  city_labels:
    Beijing: [39.9, 116.4]
    Seoul: [37.5, 127.0]
    Tokyo: [35.7, 139.7]
    Shanghai: [31.2, 121.5]
    Manila: [14.6, 121.0]
    Bangkok: [13.75, 100.5]
    Hanoi: [21.0, 105.85]
    Singapore: [1.35, 103.8]
    Kuala Lumpur: [3.15, 101.7]
    Hong Kong: [22.3, 114.2]

# Model configuration
model:
  cesm_asiaq:
    mod_type: generic  # Regridded 2D data (no vertical dimension)
    # Scratch storage (fast parallel FS)
    files: /glade/derecho/scratch/fillmore/ASIA-AQ/model/f.e3b06m.FCnudged.t6s.01x01.01.cam.h2i.2024-02-*.nc
    radius_of_influence: 15000  # 15 km for 0.1 deg grid

    # Variable mapping: obs_label -> {obs_var: model_var}
    mapping:
      airnow:
        pm25: PM25
        ozone: O3
      aeronet:
        aod_500nm: AODVISdn
      dc8:
        O3_ROZE_STCLAIR: O3
        NO2_CANOE_STCLAIR: NO2
        CO_DACOM_DISKIN: CO

    # Model variable configurations with unit conversions
    variables:
      O3:
        unit_scale: 1.0e9  # mol/mol to ppb
        units: ppb
        ylabel_plot: "O$_3$ (ppb)"
        vmin_plot: 0
        vmax_plot: 100
        vdiff_plot: 30
      NO2:
        unit_scale: 1.0e9  # mol/mol to ppb
        units: ppb
        ylabel_plot: "NO$_2$ (ppb)"
        vmin_plot: 0
        vmax_plot: 50
        vdiff_plot: 20
      CO:
        unit_scale: 1.0e9  # mol/mol to ppb
        units: ppb
        ylabel_plot: "CO (ppb)"
        vmin_plot: 0
        vmax_plot: 1000
        vdiff_plot: 200
      PM25:
        unit_scale: 1.2e9  # kg/kg to ug/m3 (× air density × 1e9)
        units: μg/m³
        ylabel_plot: "PM$_{2.5}$ (μg/m³)"
        vmin_plot: 0
        vmax_plot: 150
        vdiff_plot: 50
      AODVISdn:
        unit_scale: 1.0
        units: "1"
        ylabel_plot: "AOD (550 nm)"
        vmin_plot: 0
        vmax_plot: 2.0
        vdiff_plot: 0.5

# Observation configurations
obs:
  # AirNow surface observations (US Embassy/Consulate monitors in Asia)
  airnow:
    obs_type: pt_sfc
    filename: /glade/derecho/scratch/fillmore/ASIA-AQ/obs/airnow_asiaq_2024-02-01_2024-02-29.nc
    variables:
      pm25:
        obs_min: 0
        obs_max: 500
        units: μg/m³
        ylabel_plot: "PM$_{2.5}$ (μg/m³)"
      ozone:
        obs_min: 0
        obs_max: 200
        units: ppb
        ylabel_plot: "O$_3$ (ppb)"

  # AERONET AOD
  aeronet:
    obs_type: pt_sfc
    filename: /glade/derecho/scratch/fillmore/ASIA-AQ/obs/AERONET_L15_20240101_20240501.nc
    variables:
      aod_500nm:
        obs_min: 0
        obs_max: 5.0
        units: "1"
        ylabel_plot: "AOD (500 nm)"

  # DC-8 aircraft observations (ASIA-AQ campaign)
  # Using 10-second merge files (RA revision)
  dc8:
    obs_type: aircraft
    filename: /glade/derecho/scratch/fillmore/ASIA-AQ/obs/asiaaq-mrg10_dc8_202402*_RA_*.ict
    variables:
      O3_ROZE_STCLAIR:
        obs_min: 0
        obs_max: 200
        units: ppb
        ylabel_plot: "O$_3$ (ppb)"
        display_name: "O$_3$ (ROZE)"
      NO2_CANOE_STCLAIR:
        unit_scale: 0.001  # pptv to ppbv
        obs_min: 0
        obs_max: 50
        units: ppb
        ylabel_plot: "NO$_2$ (ppb)"
        display_name: "NO$_2$ (CANOE)"
      CO_DACOM_DISKIN:
        obs_min: 0
        obs_max: 500
        units: ppb
        ylabel_plot: "CO (ppb)"
        display_name: "CO (DACOM)"

# Pairing groups (which model-obs combinations to analyze)
pairs:
  # AirNow surface pairs
  cesm_airnow_pm25:
    model: cesm_asiaq
    obs: airnow
    variable:
      model_var: PM25
      obs_var: pm25

  cesm_airnow_o3:
    model: cesm_asiaq
    obs: airnow
    variable:
      model_var: O3
      obs_var: ozone

  # AERONET AOD
  cesm_aeronet_aod:
    model: cesm_asiaq
    obs: aeronet
    variable:
      model_var: AODVISdn
      obs_var: aod_500nm

  # DC-8 aircraft pairs
  cesm_dc8_o3:
    model: cesm_asiaq
    obs: dc8
    variable:
      model_var: O3
      obs_var: O3_ROZE_STCLAIR

  cesm_dc8_no2:
    model: cesm_asiaq
    obs: dc8
    variable:
      model_var: NO2
      obs_var: NO2_CANOE_STCLAIR

  cesm_dc8_co:
    model: cesm_asiaq
    obs: dc8
    variable:
      model_var: CO
      obs_var: CO_DACOM_DISKIN

# Plotting configuration
plots:
  # AirNow PM2.5 plots
  airnow_pm25_scatter:
    type: scatter
    pairs: [cesm_airnow_pm25]
    title: "PM2.5: CESM vs AirNow"

  airnow_pm25_timeseries:
    type: timeseries
    pairs: [cesm_airnow_pm25]
    title: "PM2.5 Time Series - ASIA-AQ (Mean ± Std)"
    show_uncertainty: true
    aggregate_dim: site

  airnow_pm25_spatial_bias:
    type: spatial_bias
    pairs: [cesm_airnow_pm25]
    title: "PM2.5 Spatial Bias"

  # AirNow O3 plots
  airnow_o3_scatter:
    type: scatter
    pairs: [cesm_airnow_o3]
    title: "O3: CESM vs AirNow"

  airnow_o3_timeseries:
    type: timeseries
    pairs: [cesm_airnow_o3]
    title: "O3 Time Series - ASIA-AQ (Mean ± Std)"
    show_uncertainty: true
    aggregate_dim: site

  # AOD plots
  aod_timeseries:
    type: timeseries
    pairs: [cesm_aeronet_aod]
    title: "AOD Time Series - ASIA-AQ (Mean ± Std)"
    show_uncertainty: true
    aggregate_dim: site

  aod_scatter:
    type: scatter
    pairs: [cesm_aeronet_aod]
    title: "AOD Model vs AERONET"

  aod_spatial_bias:
    type: spatial_bias
    pairs: [cesm_aeronet_aod]
    title: "AOD Spatial Bias"

  # DC-8 Aircraft plots
  dc8_o3_scatter:
    type: scatter
    pairs: [cesm_dc8_o3]
    title: "O3: CESM vs DC-8 Aircraft"

  dc8_no2_scatter:
    type: scatter
    pairs: [cesm_dc8_no2]
    title: "NO2: CESM vs DC-8 Aircraft"

  dc8_co_scatter:
    type: scatter
    pairs: [cesm_dc8_co]
    title: "CO: CESM vs DC-8 Aircraft"

  dc8_o3_flight_timeseries:
    type: flight_timeseries
    pairs: [cesm_dc8_o3]
    title: "O3 Flight-by-Flight: CESM vs DC-8"
    ncols: 4
    min_points: 10

  dc8_no2_flight_timeseries:
    type: flight_timeseries
    pairs: [cesm_dc8_no2]
    title: "NO2 Flight-by-Flight: CESM vs DC-8"
    ncols: 4
    min_points: 10

  dc8_co_flight_timeseries:
    type: flight_timeseries
    pairs: [cesm_dc8_co]
    title: "CO Flight-by-Flight: CESM vs DC-8"
    ncols: 4
    min_points: 10

  # 3D track maps
  dc8_o3_track_3d:
    type: track_map_3d
    pairs: [cesm_dc8_o3]
    title: "O3 Bias: DC-8 3D Flight Track"
    show_var: bias
    elev: 25
    azim: -60

  dc8_no2_track_3d:
    type: track_map_3d
    pairs: [cesm_dc8_no2]
    title: "NO2 Bias: DC-8 3D Flight Track"
    show_var: bias
    elev: 25
    azim: -60

  dc8_co_track_3d:
    type: track_map_3d
    pairs: [cesm_dc8_co]
    title: "CO Bias: DC-8 3D Flight Track"
    show_var: bias
    elev: 25
    azim: -60

# Statistics configuration
stats:
  output_table: true
  output_table_kwargs:
    precision: 3
  metrics:
    - N         # Number of pairs
    - MO        # Mean observation
    - MP        # Mean prediction
    - MB        # Mean bias
    - RMSE      # Root mean square error
    - R         # Correlation coefficient
    - NMB       # Normalized mean bias (%)
    - NME       # Normalized mean error (%)
    - IOA       # Index of agreement
