# ASIA-AQ CESM/CAM-chem Evaluation - AirNow Only
# Surface PM2.5 and O3 from US Embassy/Consulate monitors
#
# Model: CESM/CAM-chem (f.e3b06m.FCnudged.t6s.01x01.01)
# Period: February 1-29, 2024 (leap year)
# Domain: 0-45°N, 90-140°E
#
# Fast run: single obs dataset avoids repeated Dask model loading

analysis:
  start_time: "2024-02-01"
  end_time: "2024-02-29"
  output_dir: /glade/work/fillmore/DAVINCI-MONET/analyses/asia-aq/output
  log_dir: /glade/work/fillmore/DAVINCI-MONET/analyses/asia-aq/logs
  debug: false
  style:
    theme: ncar
    context: default

  city_labels:
    Beijing: [39.9, 116.4]
    Seoul: [37.5, 127.0]
    Tokyo: [35.7, 139.7]
    Shanghai: [31.2, 121.5]
    Manila: [14.6, 121.0]
    Bangkok: [13.75, 100.5]
    Hanoi: [21.0, 105.85]
    Singapore: [1.35, 103.8]
    Kuala Lumpur: [3.15, 101.7]
    Hong Kong: [22.3, 114.2]

model:
  cesm_asiaq:
    mod_type: generic
    files: /glade/derecho/scratch/fillmore/ASIA-AQ/model/f.e3b06m.FCnudged.t6s.01x01.01.cam.h2i.2024-02-*.nc
    radius_of_influence: 15000

    mapping:
      airnow:
        pm25: PM25
        ozone: O3

    variables:
      O3:
        unit_scale: 1.0e9
        units: ppb
        ylabel_plot: "O$_3$ (ppb)"
        vmin_plot: 0
        vmax_plot: 100
        vdiff_plot: 30
      PM25:
        unit_scale: 1.2e9
        units: μg/m³
        ylabel_plot: "PM$_{2.5}$ (μg/m³)"
        vmin_plot: 0
        vmax_plot: 150
        vdiff_plot: 50

obs:
  airnow:
    obs_type: pt_sfc
    filename: /glade/derecho/scratch/fillmore/ASIA-AQ/obs/airnow_asiaq_2024-02-01_2024-02-29.nc
    variables:
      pm25:
        obs_min: 0
        obs_max: 500
        units: μg/m³
        ylabel_plot: "PM$_{2.5}$ (μg/m³)"
      ozone:
        obs_min: 0
        obs_max: 200
        units: ppb
        ylabel_plot: "O$_3$ (ppb)"

pairs:
  cesm_airnow_pm25:
    model: cesm_asiaq
    obs: airnow
    variable:
      model_var: PM25
      obs_var: pm25

  cesm_airnow_o3:
    model: cesm_asiaq
    obs: airnow
    variable:
      model_var: O3
      obs_var: ozone

plots:
  airnow_pm25_scatter:
    type: scatter
    pairs: [cesm_airnow_pm25]
    title: "PM2.5: CESM vs AirNow"

  airnow_pm25_timeseries:
    type: timeseries
    pairs: [cesm_airnow_pm25]
    title: "PM2.5 Time Series - ASIA-AQ (Mean ± Std)"
    show_uncertainty: true
    aggregate_dim: site

  airnow_pm25_spatial_bias:
    type: spatial_bias
    pairs: [cesm_airnow_pm25]
    title: "PM2.5 Spatial Bias"

  airnow_o3_scatter:
    type: scatter
    pairs: [cesm_airnow_o3]
    title: "O3: CESM vs AirNow"

  airnow_o3_timeseries:
    type: timeseries
    pairs: [cesm_airnow_o3]
    title: "O3 Time Series - ASIA-AQ (Mean ± Std)"
    show_uncertainty: true
    aggregate_dim: site

stats:
  output_table: true
  output_table_kwargs:
    precision: 3
  metrics: [N, MO, MP, MB, RMSE, R, NMB, NME, IOA]
