# ASIA-AQ CESM/CAM-chem Evaluation Configuration (Scratch Storage)
# Performance test using /glade/derecho/scratch for faster I/O
#
# Model: CESM/CAM-chem (f.e3b06m.FCnudged.t6s.01x01.01)
# Period: February 1-3, 2024 (3 days for testing)
# Domain: 0-45N, 90-140E
#
# Setup commands:
#   # Create directories
#   mkdir -p /glade/derecho/scratch/fillmore/ASIA-AQ/{model,obs}
#
#   # Extract model data (3 days)
#   cd /glade/derecho/scratch/fillmore/ASIA-AQ/model
#   for day in 01 02 03; do
#     tar -xf /glade/derecho/scratch/fillmore/ASIA-AQ.2024-02-${day}.tar --strip-components=8
#   done
#
#   # Extract DC-8 aircraft data
#   cd /glade/derecho/scratch/fillmore/ASIA-AQ/obs
#   tar -xf /glade/derecho/scratch/fillmore/DC8.tar --strip-components=7
#
#   # Copy AERONET
#   cp /glade/work/fillmore/ASIA-AQ/model-subset/AERONET_L15_20240101_20240501.nc \
#      /glade/derecho/scratch/fillmore/ASIA-AQ/obs/

analysis:
  start_time: "2024-02-01"
  end_time: "2024-02-03"
  output_dir: /glade/derecho/scratch/fillmore/ASIA-AQ/output
  log_dir: /glade/derecho/scratch/fillmore/ASIA-AQ/logs
  debug: true  # Show timing info

  city_labels:
    Beijing: [39.9, 116.4]
    Seoul: [37.5, 127.0]
    Tokyo: [35.7, 139.7]
    Shanghai: [31.2, 121.5]
    Manila: [14.6, 121.0]
    Bangkok: [13.75, 100.5]

# Model configuration - SCRATCH STORAGE
model:
  cesm_asiaq:
    mod_type: generic
    files: /glade/derecho/scratch/fillmore/ASIA-AQ/model/f.e3b06m.FCnudged.t6s.GEMSne30x8.01/regridded_0.1deg/f.e3b06m.FCnudged.t6s.01x01.01.cam.h2i.2024-02-0[1-3]-*.nc
    radius_of_influence: 15000

    mapping:
      aeronet:
        aod_500nm: AODVISdn
      dc8:
        O3_ROZE_STCLAIR: O3
        NO2_CANOE_STCLAIR: NO2
        CO_DACOM_DISKIN: CO

    variables:
      O3:
        unit_scale: 1.0e9
        units: ppb
        vmin_plot: 0
        vmax_plot: 100
        vdiff_plot: 30
      NO2:
        unit_scale: 1.0e9
        units: ppb
        vmin_plot: 0
        vmax_plot: 50
        vdiff_plot: 20
      CO:
        unit_scale: 1.0e9
        units: ppb
        vmin_plot: 0
        vmax_plot: 1000
        vdiff_plot: 200
      AODVISdn:
        unit_scale: 1.0
        units: "1"
        vmin_plot: 0
        vmax_plot: 2.0
        vdiff_plot: 0.5

# Observation configurations - ALL ON SCRATCH
obs:
  aeronet:
    obs_type: pt_sfc
    filename: /glade/derecho/scratch/fillmore/ASIA-AQ/obs/AERONET_L15_20240101_20240501.nc
    variables:
      aod_500nm:
        obs_min: 0
        obs_max: 5.0
        units: "1"

  dc8:
    obs_type: aircraft
    filename: /glade/derecho/scratch/fillmore/ASIA-AQ/obs/asiaaq-mrg10_dc8_202402*_RA_*.ict
    variables:
      O3_ROZE_STCLAIR:
        obs_min: 0
        obs_max: 200
        units: ppb
      NO2_CANOE_STCLAIR:
        unit_scale: 0.001  # pptv to ppbv
        obs_min: 0
        obs_max: 50
        units: ppb
      CO_DACOM_DISKIN:
        obs_min: 0
        obs_max: 500
        units: ppb

pairs:
  cesm_aeronet_aod:
    model: cesm_asiaq
    obs: aeronet
    variable:
      model_var: AODVISdn
      obs_var: aod_500nm

  cesm_dc8_o3:
    model: cesm_asiaq
    obs: dc8
    variable:
      model_var: O3
      obs_var: O3_ROZE_STCLAIR

  cesm_dc8_no2:
    model: cesm_asiaq
    obs: dc8
    variable:
      model_var: NO2
      obs_var: NO2_CANOE_STCLAIR

  cesm_dc8_co:
    model: cesm_asiaq
    obs: dc8
    variable:
      model_var: CO
      obs_var: CO_DACOM_DISKIN

plots:
  aod_scatter:
    type: scatter
    pairs: [cesm_aeronet_aod]
    title: "AOD Model vs AERONET"

  aod_spatial_bias:
    type: spatial_bias
    pairs: [cesm_aeronet_aod]
    title: "AOD Spatial Bias"

  dc8_o3_scatter:
    type: scatter
    pairs: [cesm_dc8_o3]
    title: "O3: CESM vs DC-8"

  dc8_no2_scatter:
    type: scatter
    pairs: [cesm_dc8_no2]
    title: "NO2: CESM vs DC-8"

  dc8_co_scatter:
    type: scatter
    pairs: [cesm_dc8_co]
    title: "CO: CESM vs DC-8"

stats:
  output_table: true
  metrics: [N, MB, RMSE, R, NMB]
