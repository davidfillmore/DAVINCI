# ASIA-AQ CESM/CAM-chem Evaluation - Pandora Only
# NO2 tropospheric column from Pandora ground-based spectrometers
#
# Model: CESM/CAM-chem NO2 column (integrated from 3D field)
# Period: February 1-29, 2024 (leap year)
# Domain: 0-45°N, 90-140°E
#
# Fast run: single obs dataset avoids repeated Dask model loading

analysis:
  start_time: "2024-02-01"
  end_time: "2024-02-29"
  output_dir: /glade/work/fillmore/DAVINCI-MONET/analyses/asia-aq/output
  log_dir: /glade/work/fillmore/DAVINCI-MONET/analyses/asia-aq/logs
  debug: false
  style:
    theme: ncar
    context: default

  city_labels:
    Beijing: [39.9, 116.4]
    Seoul: [37.5, 127.0]
    Tokyo: [35.7, 139.7]
    Shanghai: [31.2, 121.5]
    Manila: [14.6, 121.0]
    Bangkok: [13.75, 100.5]
    Hanoi: [21.0, 105.85]
    Singapore: [1.35, 103.8]
    Kuala Lumpur: [3.15, 101.7]
    Hong Kong: [22.3, 114.2]

model:
  cesm_no2_column:
    mod_type: generic
    files: /glade/derecho/scratch/fillmore/ASIA-AQ/obs/cesm_no2_column_20240201_20240229.nc
    radius_of_influence: 15000

    mapping:
      pandora:
        no2_trop_column: NO2_column

    variables:
      NO2_column:
        unit_scale: 1.0
        units: mol/m²
        ylabel_plot: "NO$_2$ Column (mol/m²)"
        vmin_plot: 0
        vmax_plot: 5.0e-4
        vdiff_plot: 2.0e-4

obs:
  pandora:
    obs_type: pt_sfc
    filename: /glade/derecho/scratch/fillmore/ASIA-AQ/obs/pandora_no2_column_20240201_20240229.nc
    resample: "h"              # Average sub-hourly obs to hourly
    min_obs_count: 3           # Require at least 3 obs per hour
    track_obs_count: true      # Add obs_count variable for diagnostics
    variables:
      no2_trop_column:
        obs_min: 0
        obs_max: 5.0e-3
        units: mol/m²
        ylabel_plot: "NO$_2$ Column (mol/m²)"

pairs:
  cesm_pandora_no2:
    model: cesm_no2_column
    obs: pandora
    variable:
      model_var: NO2_column
      obs_var: no2_trop_column

plots:
  no2_column_scatter:
    type: scatter
    pairs: [cesm_pandora_no2]
    title: "NO2 Column: CESM vs Pandora"
    show_density: true

  no2_column_timeseries:
    type: timeseries
    pairs: [cesm_pandora_no2]
    title: "NO2 Column Time Series (Mean ± Std)"
    show_uncertainty: true
    aggregate_dim: site

  no2_column_spatial_bias:
    type: spatial_bias
    pairs: [cesm_pandora_no2]
    title: "NO2 Column Spatial Bias"

  no2_column_site_timeseries:
    type: site_timeseries
    pairs: [cesm_pandora_no2]
    title: "NO2 Tropospheric Column: Pandora vs CESM"
    ncols: 3
    min_points: 50
    scale_factor: 10000  # mol/m2 -> 10^-4 mol/m2

stats:
  output_table: true
  output_table_kwargs:
    precision: 3
  metrics: [N, MO, MP, MB, RMSE, R, NMB, NME, IOA]
