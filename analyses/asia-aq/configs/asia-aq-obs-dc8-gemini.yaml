# ASIA-AQ DC-8 aircraft observation-only analysis (Gemini - Mac)
#
# O3, NO2, CO from DC-8 aircraft (60-second merge files).
# Uses obs-only plot types: flight tracks, vertical profiles, histograms.
#
# No model section -- triggers obs-only pipeline mode.
#
# Usage:
#   davinci-monet run analyses/asia-aq/configs/asia-aq-obs-dc8-gemini.yaml

analysis:
  start_time: "2024-02-01"
  end_time: "2024-02-29"
  output_dir: /Users/fillmore/EarthSystem/DAVINCI-MONET/analyses/asia-aq/output/obs-only
  log_dir: /Users/fillmore/EarthSystem/DAVINCI-MONET/analyses/asia-aq/logs
  style:
    theme: ncar

obs:
  dc8:
    obs_type: aircraft
    filename: /Users/fillmore/Data/ASIA-AQ/DC8/asiaaq-mrg60_dc8_202402*_RA_*.ict
    variables:
      O3_ROZE_STCLAIR:
        obs_min: 0
        obs_max: 200
        units: ppb
        ylabel_plot: "O$_3$ (ppb)"
        display_name: "O$_3$ (ROZE)"
      NO2_CANOE_STCLAIR:
        unit_scale: 0.001  # pptv to ppbv
        obs_min: 0
        obs_max: 50
        units: ppb
        ylabel_plot: "NO$_2$ (ppb)"
        display_name: "NO$_2$ (CANOE)"
      CO_DACOM_DISKIN:
        obs_min: 0
        obs_max: 500
        units: ppb
        ylabel_plot: "CO (ppb)"
        display_name: "CO (DACOM)"

plots:
  # Flight track maps colored by species
  dc8_track_o3:
    type: obs_flight_track
    obs: dc8
    variable: "O3_ROZE_STCLAIR"
    title: "DC-8 Flight Tracks: O3 (ppbv)"

  dc8_track_no2:
    type: obs_flight_track
    obs: dc8
    variable: "NO2_CANOE_STCLAIR"
    title: "DC-8 Flight Tracks: NO2 (ppbv)"

  dc8_track_co:
    type: obs_flight_track
    obs: dc8
    variable: "CO_DACOM_DISKIN"
    title: "DC-8 Flight Tracks: CO (ppbv)"

  # Vertical profiles
  dc8_profile_o3:
    type: obs_vertical_profile
    obs: dc8
    variable: "O3_ROZE_STCLAIR"
    title: "DC-8 O3 Vertical Profile"

  dc8_profile_no2:
    type: obs_vertical_profile
    obs: dc8
    variable: "NO2_CANOE_STCLAIR"
    title: "DC-8 NO2 Vertical Profile"

  dc8_profile_co:
    type: obs_vertical_profile
    obs: dc8
    variable: "CO_DACOM_DISKIN"
    title: "DC-8 CO Vertical Profile"

  # Time series
  dc8_ts_o3:
    type: obs_timeseries
    obs: dc8
    variable: "O3_ROZE_STCLAIR"
    show_altitude: true
    title: "DC-8 O3 Time Series"

  dc8_ts_no2:
    type: obs_timeseries
    obs: dc8
    variable: "NO2_CANOE_STCLAIR"
    show_altitude: true
    title: "DC-8 NO2 Time Series"

  dc8_ts_co:
    type: obs_timeseries
    obs: dc8
    variable: "CO_DACOM_DISKIN"
    show_altitude: true
    title: "DC-8 CO Time Series"

  # Distributions
  dc8_hist_o3:
    type: obs_histogram
    obs: dc8
    variable: "O3_ROZE_STCLAIR"
    title: "DC-8 O3 Distribution"

  dc8_hist_no2:
    type: obs_histogram
    obs: dc8
    variable: "NO2_CANOE_STCLAIR"
    title: "DC-8 NO2 Distribution"

  dc8_hist_co:
    type: obs_histogram
    obs: dc8
    variable: "CO_DACOM_DISKIN"
    title: "DC-8 CO Distribution"

stats:
  metrics: [N, mean, median, std, min, max, p10, p25, p75, p90]
