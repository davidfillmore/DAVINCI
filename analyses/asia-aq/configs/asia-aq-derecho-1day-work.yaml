# ASIA-AQ Minimal Test Config (1 day, /glade/work storage)
# For comparing performance: /glade/work vs /glade/campaign
#
# Same as asia-aq-derecho-1day.yaml but reading from faster /glade/work

analysis:
  start_time: "2024-02-01"
  end_time: "2024-02-01"
  output_dir: /glade/work/fillmore/ASIA-AQ/output-test-work
  log_dir: /glade/work/fillmore/ASIA-AQ/logs
  debug: true

model:
  cesm_asiaq:
    mod_type: generic  # Use generic reader for regridded 2D data
    # Files on /glade/work (faster GPFS)
    files: /glade/work/fillmore/ASIA-AQ/model-subset/f.e3b06m.FCnudged.t6s.01x01.01.cam.h2i.2024-02-01-*.nc
    radius_of_influence: 15000

    mapping:
      aeronet:
        aod_500nm: AODVISdn

    variables:
      AODVISdn:
        unit_scale: 1.0
        units: "1"

obs:
  aeronet:
    obs_type: pt_sfc
    # AERONET file on /glade/work (faster GPFS)
    filename: /glade/work/fillmore/ASIA-AQ/model-subset/AERONET_L15_20240101_20240501.nc
    variables:
      aod_500nm:
        obs_min: 0
        obs_max: 5.0
        units: "1"

pairs:
  cesm_aeronet_aod:
    model: cesm_asiaq
    obs: aeronet
    variable:
      model_var: AODVISdn
      obs_var: aod_500nm

plots:
  aod_scatter:
    type: scatter
    pairs: [cesm_aeronet_aod]
    title: "AOD Model vs AERONET (1 day, /glade/work)"

stats:
  metrics: [N, MB, RMSE, R]
