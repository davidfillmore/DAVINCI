# ASIA-AQ AirNow observation-only analysis (Gemini - Mac)
#
# Surface PM2.5, O3, NO2, CO from US Embassy/Consulate monitors
# across the ASIA-AQ domain (East and Southeast Asia).
#
# No model section -- triggers obs-only pipeline mode.
#
# Usage:
#   davinci-monet run analyses/asia-aq/configs/asia-aq-obs-airnow-gemini.yaml

analysis:
  start_time: "2024-02-01"
  end_time: "2024-02-29"
  output_dir: /Users/fillmore/EarthSystem/DAVINCI-MONET/analyses/asia-aq/output/obs-only
  log_dir: /Users/fillmore/EarthSystem/DAVINCI-MONET/analyses/asia-aq/logs
  style:
    theme: ncar

obs:
  airnow:
    obs_type: pt_sfc
    filename: /Users/fillmore/EarthSystem/DAVINCI-MONET/analyses/asia-aq/data/airnow_asiaq_2024-02-01_2024-02-29.nc
    variables:
      pm25:
        obs_min: 0
        obs_max: 500
        units: ug/m3
        ylabel_plot: "PM$_{2.5}$ (ug/m3)"
      ozone:
        obs_min: 0
        obs_max: 200
        units: ppb
        ylabel_plot: "O$_3$ (ppb)"
      no2:
        obs_min: 0
        obs_max: 100
        units: ppb
        ylabel_plot: "NO$_2$ (ppb)"
      co:
        unit_scale: 1000  # ppm to ppb
        obs_min: 0
        obs_max: 5000
        units: ppb
        ylabel_plot: "CO (ppb)"

plots:
  airnow_pm25_timeseries:
    type: obs_timeseries
    obs: airnow
    variable: "pm25"
    title: "AirNow PM2.5 Time Series - ASIA-AQ"

  airnow_o3_timeseries:
    type: obs_timeseries
    obs: airnow
    variable: "ozone"
    title: "AirNow O3 Time Series - ASIA-AQ"

  airnow_no2_timeseries:
    type: obs_timeseries
    obs: airnow
    variable: "no2"
    title: "AirNow NO2 Time Series - ASIA-AQ"

  airnow_co_timeseries:
    type: obs_timeseries
    obs: airnow
    variable: "co"
    title: "AirNow CO Time Series - ASIA-AQ"

  airnow_pm25_histogram:
    type: obs_histogram
    obs: airnow
    variable: "pm25"
    title: "AirNow PM2.5 Distribution - ASIA-AQ"

  airnow_o3_histogram:
    type: obs_histogram
    obs: airnow
    variable: "ozone"
    title: "AirNow O3 Distribution - ASIA-AQ"

  airnow_no2_histogram:
    type: obs_histogram
    obs: airnow
    variable: "no2"
    title: "AirNow NO2 Distribution - ASIA-AQ"

  airnow_co_histogram:
    type: obs_histogram
    obs: airnow
    variable: "co"
    title: "AirNow CO Distribution - ASIA-AQ"

stats:
  metrics: [N, mean, median, std, min, max, p10, p25, p75, p90]
