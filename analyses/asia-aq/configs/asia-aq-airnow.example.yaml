# ASIA-AQ CESM/CAM-chem Evaluation — AirNow Surface
#
# Paired evaluation of surface PM2.5, O3, NO2, CO from AirNow monitors
# against CESM/CAM-chem output over East and Southeast Asia.
#
# Required environment variables:
#   ASIA_AQ_DATA     — Root directory containing CAM dataset files
#   ASIA_AQ_ANALYSIS — Analysis directory (parent of output/ and logs/)
#
# Usage:
#   export ASIA_AQ_DATA=~/Data/ASIA-AQ
#   export ASIA_AQ_ANALYSIS=$(pwd)
#   davinci-monet run analyses/asia-aq/configs/asia-aq-airnow.example.yaml

analysis:
  start_time: "2024-02-01"
  end_time: "2024-02-29"
  output_dir: ${ASIA_AQ_ANALYSIS}/output
  log_dir: ${ASIA_AQ_ANALYSIS}/logs
  debug: false
  style:
    theme: ncar
    context: default

  city_labels:
    Beijing: [39.9, 116.4]
    Seoul: [37.5, 127.0]
    Tokyo: [35.7, 139.7]
    Shanghai: [31.2, 121.5]
    Manila: [14.6, 121.0]
    Bangkok: [13.75, 100.5]

sources:
  cesm_asiaq:
    type: generic
    files: ${ASIA_AQ_DATA}/CAM/f.e3b06m.FCnudged.t6s.01x01.01.cam.h2i.2024-02-*.nc
    radius_of_influence: 15000

    variables:
      O3:
        unit_scale: 1.0e9
        units: ppb
        ylabel_plot: "O$_3$ (ppb)"
        vmin_plot: 0
        vmax_plot: 100
        vdiff_plot: 30
      NO2:
        unit_scale: 1.0e9
        units: ppb
        ylabel_plot: "NO$_2$ (ppb)"
        vmin_plot: 0
        vmax_plot: 50
        vdiff_plot: 20
      CO:
        unit_scale: 1.0e9
        units: ppb
        ylabel_plot: "CO (ppb)"
        vmin_plot: 0
        vmax_plot: 1000
        vdiff_plot: 200
      PM25:
        unit_scale: 1.2e9
        units: ug/m3
        ylabel_plot: "PM$_{2.5}$ (ug/m3)"
        vmin_plot: 0
        vmax_plot: 150
        vdiff_plot: 50

  airnow:
    type: pt_sfc
    filename: ${ASIA_AQ_ANALYSIS}/data/airnow_asiaq_2024-02-01_2024-02-29.nc
    variables:
      pm25:
        geometry_min: 0
        geometry_max: 500
        units: ug/m3
      ozone:
        geometry_min: 0
        geometry_max: 200
        units: ppb
      no2:
        geometry_min: 0
        geometry_max: 100
        units: ppb
      co:
        unit_scale: 1000
        geometry_min: 0
        geometry_max: 5000
        units: ppb

pairs:
  cesm_airnow_pm25:
    x: { source: airnow, variable: pm25 }
    y: { source: cesm_asiaq, variable: PM25 }

  cesm_airnow_o3:
    x: { source: airnow, variable: ozone }
    y: { source: cesm_asiaq, variable: O3 }

  cesm_airnow_no2:
    x: { source: airnow, variable: no2 }
    y: { source: cesm_asiaq, variable: NO2 }

  cesm_airnow_co:
    x: { source: airnow, variable: co }
    y: { source: cesm_asiaq, variable: CO }

plots:
  airnow_pm25_scatter:
    type: scatter
    pairs: [cesm_airnow_pm25]
    title: "PM2.5: CESM vs AirNow"

  airnow_pm25_timeseries:
    type: timeseries
    pairs: [cesm_airnow_pm25]
    title: "PM2.5 Time Series"
    show_uncertainty: true
    aggregate_dim: site

  airnow_pm25_spatial_bias:
    type: spatial_bias
    pairs: [cesm_airnow_pm25]
    title: "PM2.5 Spatial Bias"

  airnow_o3_scatter:
    type: scatter
    pairs: [cesm_airnow_o3]
    title: "O3: CESM vs AirNow"

  airnow_o3_timeseries:
    type: timeseries
    pairs: [cesm_airnow_o3]
    title: "O3 Time Series"
    show_uncertainty: true
    aggregate_dim: site

  airnow_o3_spatial_bias:
    type: spatial_bias
    pairs: [cesm_airnow_o3]
    title: "O3 Spatial Bias"

stats:
  output_table: true
  output_table_kwargs:
    precision: 3
  metrics: [N, MG, MD, MB, RMSE, R, NMB, NME, IOA]
