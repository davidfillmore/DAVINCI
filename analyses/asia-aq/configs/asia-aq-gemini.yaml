# ASIA-AQ CESM/CAM-chem Evaluation Configuration (Gemini - Mac)
# Testing AERONET NetCDF reader with new data format
#
# Model: CESM/CAM-chem (f.e3b06m.FCnudged.t6s.01x01.01)
# Period: February 1-3, 2024 (short test)
# Domain: 0-45°N, 90-140°E
#
# Data location: ~/Data/ASIA-AQ/

analysis:
  start_time: "2024-02-01"
  end_time: "2024-02-03"
  output_dir: ${ASIA_AQ_ANALYSIS}/output
  log_dir: ${ASIA_AQ_ANALYSIS}/logs
  debug: true

  # City labels for spatial plots: {name: [lat, lon]}
  city_labels:
    Beijing: [39.9, 116.4]
    Seoul: [37.5, 127.0]
    Tokyo: [35.7, 139.7]
    Shanghai: [31.2, 121.5]
    Manila: [14.6, 121.0]
    Bangkok: [13.75, 100.5]
    Hong Kong: [22.3, 114.2]

# Model configuration
model:
  cesm_asiaq:
    mod_type: generic  # 2D regridded data (no vertical dimension)
    files: ${ASIA_AQ_DATA}/CAM/f.e3b06m.FCnudged.t6s.01x01.01.cam.h2i.2024-02-0[1-3]-*.nc
    radius_of_influence: 15000  # 15 km for 0.1 deg grid

    # Variable mapping: obs_label -> {obs_var: model_var}
    mapping:
      aeronet:
        aod_500nm: AODVISdn

    # Model variable configurations with unit conversions
    variables:
      AODVISdn:
        unit_scale: 1.0
        units: "1"
        ylabel_plot: "AOD (550 nm)"
        vmin_plot: 0
        vmax_plot: 2.0
        vdiff_plot: 0.5

# Observation configurations
obs:
  aeronet:
    obs_type: pt_sfc
    # New AERONET NetCDF file from Derecho (5 months)
    filename: ${ASIA_AQ_DATA}/AERONET/AERONET_L15_20240101_20240501.nc
    variables:
      aod_500nm:
        obs_min: 0
        obs_max: 5.0
        units: "1"
        ylabel_plot: "AOD (500 nm)"

# Pairing groups
pairs:
  cesm_aeronet_aod:
    model: cesm_asiaq
    obs: aeronet
    variable:
      model_var: AODVISdn
      obs_var: aod_500nm

# Plotting configuration (minimal for testing)
plots:
  aod_scatter:
    type: scatter
    pairs: [cesm_aeronet_aod]
    title: "AOD Model vs AERONET"

  aod_timeseries:
    type: timeseries
    pairs: [cesm_aeronet_aod]
    title: "AOD Time Series - ASIA-AQ"
    show_uncertainty: true
    aggregate_dim: site  # site dimension after standardization

# Statistics configuration
stats:
  output_table: true
  output_table_kwargs:
    precision: 3
  metrics:
    - N         # Number of pairs
    - MO        # Mean observation
    - MP        # Mean prediction
    - MB        # Mean bias
    - RMSE      # Root mean square error
    - R         # Correlation coefficient
    - NMB       # Normalized mean bias (%)
