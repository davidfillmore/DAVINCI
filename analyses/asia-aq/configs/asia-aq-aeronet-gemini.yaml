# ASIA-AQ CESM/CAM-chem Evaluation - AERONET Only (Gemini - Mac)
# Aerosol Optical Depth (AOD) from AERONET ground stations
#
# Model: CESM/CAM-chem (f.e3b06m.FCnudged.t6s.01x01.01)
# Period: February 1-29, 2024 (leap year)
# Domain: 0-45N, 90-140E
#
# Fast run: single obs dataset avoids repeated Dask model loading

analysis:
  start_time: "2024-02-01"
  end_time: "2024-02-29"
  output_dir: /Users/fillmore/EarthSystem/DAVINCI-MONET/analyses/asia-aq/output
  log_dir: /Users/fillmore/EarthSystem/DAVINCI-MONET/analyses/asia-aq/logs
  debug: false
  style:
    theme: ncar
    context: default

  city_labels:
    Beijing: [39.9, 116.4]
    Seoul: [37.5, 127.0]
    Tokyo: [35.7, 139.7]
    Shanghai: [31.2, 121.5]
    Manila: [14.6, 121.0]
    Bangkok: [13.75, 100.5]
    Hanoi: [21.0, 105.85]
    Singapore: [1.35, 103.8]
    Kuala Lumpur: [3.15, 101.7]
    Hong Kong: [22.3, 114.2]

model:
  cesm_asiaq:
    mod_type: generic
    files: /Users/fillmore/Data/ASIA-AQ/CAM/f.e3b06m.FCnudged.t6s.01x01.01.cam.h2i.2024-02-*.nc
    radius_of_influence: 15000

    mapping:
      aeronet:
        aod_500nm: AODVISdn

    variables:
      AODVISdn:
        unit_scale: 1.0
        units: "1"
        ylabel_plot: "AOD (550 nm)"
        vmin_plot: 0
        vmax_plot: 2.0
        vdiff_plot: 0.5

obs:
  aeronet:
    obs_type: pt_sfc
    filename: /Users/fillmore/Data/ASIA-AQ/AERONET/AERONET_L15_20240101_20240501.nc
    variables:
      aod_500nm:
        obs_min: 0
        obs_max: 5.0
        units: "1"
        ylabel_plot: "AOD (500 nm)"

pairs:
  cesm_aeronet_aod:
    model: cesm_asiaq
    obs: aeronet
    variable:
      model_var: AODVISdn
      obs_var: aod_500nm

plots:
  aod_scatter:
    type: scatter
    pairs: [cesm_aeronet_aod]
    title: "AOD Model vs AERONET"

  aod_timeseries:
    type: timeseries
    pairs: [cesm_aeronet_aod]
    title: "AOD Time Series - ASIA-AQ (Mean +/- Std)"
    show_uncertainty: true
    aggregate_dim: site

  aod_spatial_bias:
    type: spatial_bias
    pairs: [cesm_aeronet_aod]
    title: "AOD Spatial Bias"

stats:
  output_table: true
  output_table_kwargs:
    precision: 3
  metrics: [N, MO, MP, MB, RMSE, R, NMB, NME, IOA]
