# ASIA-AQ AERONET observation-only analysis (Gemini - Mac)
#
# Aerosol Optical Depth (AOD) from AERONET ground-based sun photometers
# across the ASIA-AQ domain.
#
# No model section -- triggers obs-only pipeline mode.
#
# Usage:
#   davinci-monet run analyses/asia-aq/configs/asia-aq-obs-aeronet-gemini.yaml

analysis:
  start_time: "2024-02-01"
  end_time: "2024-02-29"
  output_dir: /Users/fillmore/EarthSystem/DAVINCI-MONET/analyses/asia-aq/output/obs-only
  log_dir: /Users/fillmore/EarthSystem/DAVINCI-MONET/analyses/asia-aq/logs
  style:
    theme: ncar

obs:
  aeronet:
    obs_type: pt_sfc
    filename: /Users/fillmore/Data/ASIA-AQ/AERONET/AERONET_L15_20240101_20240501.nc
    variables:
      aod_500nm:
        obs_min: 0
        obs_max: 5.0
        units: "1"
        ylabel_plot: "AOD (500 nm)"

plots:
  aeronet_aod_timeseries:
    type: obs_timeseries
    obs: aeronet
    variable: "aod_500nm"
    title: "AERONET AOD (500 nm) Time Series - ASIA-AQ"

  aeronet_aod_histogram:
    type: obs_histogram
    obs: aeronet
    variable: "aod_500nm"
    title: "AERONET AOD (500 nm) Distribution - ASIA-AQ"

stats:
  metrics: [N, mean, median, std, min, max, p10, p25, p75, p90]
