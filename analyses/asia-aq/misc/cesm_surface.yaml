# ASIA-AQ CESM/CAM-chem Evaluation Configuration
# Dataset: f.e3b06m.FCnudged.t6s.01x01.01 (0.1 deg, 32 levels)
# Period: February 1-3, 2024

analysis:
  start_time: "2024-02-01"
  end_time: "2024-02-03"
  output_dir: ../output/cesm_surface
  debug: false

sources:
  cesm_asiaq:
    type: cesm_fv
    files: ~/Data/ASIA-AQ/f.e3b06m.FCnudged.t6s.01x01.01.cam.h2i.*.nc
    # Dataset output is hourly, 0.1 deg resolution
    radius_of_influence: 15000  # 15 km for 0.1 deg grid    # Unit conversions: CESM outputs mol/mol, need ppb for trace gases
    variables:
      O3:
        # mol/mol to ppb: multiply by 1e9
        scale: 1.0e9
        ylabel_plot: "O3 (ppbv)"
        vmin_plot: 0
        vmax_plot: 120
        vdiff_plot: 40
      NO2:
        scale: 1.0e9
        ylabel_plot: "NO2 (ppbv)"
        vmin_plot: 0
        vmax_plot: 40
        vdiff_plot: 20
      CO:
        scale: 1.0e9
        ylabel_plot: "CO (ppbv)"
        vmin_plot: 0
        vmax_plot: 500
        vdiff_plot: 100
      PM25:
        # mol/mol to ug/m3 requires density conversion (approximate)
        scale: 1.0e9
        ylabel_plot: "PM2.5 (ug/m3)"
        vmin_plot: 0
        vmax_plot: 100
        vdiff_plot: 50

# Dataset data - placeholder for when data is acquired
# Options: OpenAQ (surface), ICARTT (aircraft), TROPOMI (satellite)
  openaq_asia:
    type: openaq
    # Will need to download OpenAQ data for ASIA-AQ domain
    filename: ../data/openaq_asiaq_202402.nc
    variables:
      o3:
        valid_min: 0
        valid_max: 200
      no2:
        valid_min: 0
        valid_max: 100
      co:
        valid_min: 0
        valid_max: 5000
      pm25:
        valid_min: 0
        valid_max: 500

# One binary pair per variable. The plots below geometry the O3 pair.
pairs:
  cesm_asiaq_openaq_asia:
    x: { source: openaq_asia, variable: o3 }
    y: { source: cesm_asiaq, variable: O3 }

  cesm_asiaq_openaq_asia_no2:
    x: { source: openaq_asia, variable: no2 }
    y: { source: cesm_asiaq, variable: NO2 }

  cesm_asiaq_openaq_asia_co:
    x: { source: openaq_asia, variable: co }
    y: { source: cesm_asiaq, variable: CO }

  cesm_asiaq_openaq_asia_pm25:
    x: { source: openaq_asia, variable: pm25 }
    y: { source: cesm_asiaq, variable: PM25 }

# Plotting configuration
plots:
  timeseries_o3:
    type: timeseries
    domain_type: [all]
    domain_name: [ASIA]
    pairs: [cesm_asiaq_openaq_asia]

  scatter_o3:
    type: scatter
    domain_type: [all]
    domain_name: [ASIA]
    pairs: [cesm_asiaq_openaq_asia]

  diurnal_o3:
    type: diurnal
    domain_type: [all]
    domain_name: [ASIA]
    pairs: [cesm_asiaq_openaq_asia]

  spatial_bias:
    type: spatial_bias
    domain_type: [all]
    domain_name: [ASIA]
    pairs: [cesm_asiaq_openaq_asia]

# Statistics to compute
stats:
  output_table: true
  output_table_kwargs:
    precision: 3
  metrics:
    - N        # Number of pairs
    - MX       # Mean x
    - MY       # Mean y
    - MB       # Mean bias
    - RMSE     # Root mean square error
    - R        # Correlation coefficient
    - NMB      # Normalized mean bias
    - NME      # Normalized mean error
    - IOA      # Index of agreement
