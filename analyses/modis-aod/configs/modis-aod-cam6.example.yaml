# MODIS AOD vs CAM6 — Australian Bushfire Event
# Dec 21-23, 2019
#
# Terra and Aqua MODIS L2 AOD binned onto the CAM6 grid, compared against
# two CAM6 dataset variants (base and new dust emissions).
#
# Required environment variables:
#   MODIS_DATA     — Root directory containing MODIS L2 HDF files
#   CAM6_DATA      — Root directory containing CAM6 NetCDF files
#   MODIS_ANALYSIS — Analysis directory (parent of output/, logs/, data/)
#
# Usage:
#   export MODIS_DATA=~/Data/MODIS
#   export CAM6_DATA=~/Data/CAM6
#   export MODIS_ANALYSIS=$(pwd)
#   davinci-monet run analyses/modis-aod/configs/modis-aod-cam6.example.yaml

analysis:
  start_time: "2019-12-21"
  end_time: "2019-12-24"
  output_dir: ${MODIS_ANALYSIS}/output
  log_dir: ${MODIS_ANALYSIS}/logs
  debug: false
  style:
    theme: ncar
    context: default

# MODIS L2 swath geometry are binned onto the gridded dataset source named by
# `grid_source`. The gridded dataset source must be loaded before the swath
# source, so list it first.
sources:
  cam6_base:
    type: generic
    files: ${CAM6_DATA}/FCnudged_f09.mam.BaseMar27.2019_2021.001_AODVIS.nc
    variables:
      AODVIS:
        unit_scale: 1.0
        units: "1"
        ylabel_plot: "AOD (550 nm)"
        vmin_plot: 0
        vmax_plot: 1.0
        vdiff_plot: 0.3
  cam6_newdust:
    type: generic
    files: ${CAM6_DATA}/FCnudged_f09.mam.newdustMar282025.2019_2021.001_AODVIS.nc
    variables:
      AODVIS:
        unit_scale: 1.0
        units: "1"
        ylabel_plot: "AOD (550 nm)"
        vmin_plot: 0
        vmax_plot: 1.0
        vdiff_plot: 0.3
  terra_modis:
    type: modis_l2_aod
    filename: ${MODIS_DATA}/Terra/C61/2019/*/MOD04_L2.*.hdf
    grid_source: cam6_base
    time_resolution: "1D"
    load_binned: true
    save_binned: true
    binned_file: ${MODIS_ANALYSIS}/data/terra_modis_binned.nc
    variables:
      AOD_550_Dark_Target_Deep_Blue_Combined:
        source_name: AOD_550_Dark_Target_Deep_Blue_Combined
        rename: AOD_550
        geometry_min: 0.0
        geometry_max: 10.0
        unit_scale: 0.001

  aqua_modis:
    type: modis_l2_aod
    filename: ${MODIS_DATA}/Aqua/C61/2019/*/MYD04_L2.*.hdf
    grid_source: cam6_base
    time_resolution: "1D"
    load_binned: true
    save_binned: true
    binned_file: ${MODIS_ANALYSIS}/data/aqua_modis_binned.nc
    variables:
      AOD_550_Dark_Target_Deep_Blue_Combined:
        source_name: AOD_550_Dark_Target_Deep_Blue_Combined
        rename: AOD_550
        geometry_min: 0.0
        geometry_max: 10.0
        unit_scale: 0.001

pairs:
  base_terra:
    sources: [cam6_base, terra_modis]
    geometry: terra_modis
    variables:
      cam6_base: AODVIS
      terra_modis: AOD_550

  base_aqua:
    sources: [cam6_base, aqua_modis]
    geometry: aqua_modis
    variables:
      cam6_base: AODVIS
      aqua_modis: AOD_550

  newdust_terra:
    sources: [cam6_newdust, terra_modis]
    geometry: terra_modis
    variables:
      cam6_newdust: AODVIS
      terra_modis: AOD_550

  newdust_aqua:
    sources: [cam6_newdust, aqua_modis]
    geometry: aqua_modis
    variables:
      cam6_newdust: AODVIS
      aqua_modis: AOD_550

plots:
  aod_scatter_base_terra:
    type: scatter
    pairs: [base_terra]
    title: "AOD Scatter — CAM6 Base vs MODIS Terra"
    show_density: true

  aod_scatter_newdust_terra:
    type: scatter
    pairs: [newdust_terra]
    title: "AOD Scatter — CAM6 New Dust vs MODIS Terra"
    show_density: true

  aod_geometry_terra:
    type: spatial_distribution
    pairs: [base_terra]
    title: "MODIS Terra AOD (550 nm)"
    show_var: geometry
    plot_type: pcolormesh
    cmap: turbo

  aod_bias_base_terra:
    type: spatial_bias
    pairs: [base_terra]
    title: "AOD Bias — CAM6 Base − MODIS Terra"
    plot_type: pcolormesh

  aod_bias_newdust_terra:
    type: spatial_bias
    pairs: [newdust_terra]
    title: "AOD Bias — CAM6 New Dust − MODIS Terra"
    plot_type: pcolormesh

stats:
  metrics: [N, MG, MD, MB, RMSE, R, NMB, NME]
