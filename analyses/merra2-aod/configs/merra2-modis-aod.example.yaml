# MERRA2 vs MODIS Terra/Aqua AOD — global monthly evaluation.
#
# Required environment variables:
#   MERRA2_DATA          — dir containing MERRA2_tavgM/aer_Nx/*.nc4
#   MODIS_DATA           — dir containing MOD08_M3/ and MYD08_M3/ (*.hdf)
#   MERRA2_AOD_ANALYSIS  — analysis dir (parent of output/ and logs/)
#
# Usage:
#   export MERRA2_DATA=/Volumes/Io/MERRA2_tavgM
#   export MODIS_DATA=/Volumes/Io
#   export MERRA2_AOD_ANALYSIS=$(pwd)
#   HDF5_USE_FILE_LOCKING=FALSE davinci-monet run analyses/merra2-aod/configs/merra2-modis-aod.example.yaml

analysis:
  # Default to a short window for a fast first run; widen to sweep the full
  # archive (Terra >=2000-02, Aqua >=2002-07, MERRA2 -> 2026-03).
  start_time: "2003-01-01"
  end_time: "2003-12-31"
  output_dir: ${MERRA2_AOD_ANALYSIS}/output
  log_dir: ${MERRA2_AOD_ANALYSIS}/logs
  style:
    theme: ncar
    context: default

sources:
  merra2:
    type: generic
    files: ${MERRA2_DATA}/aer_Nx/*.nc4
    variables:
      TOTEXTTAU:
        units: "1"
        ylabel_plot: "AOD (550 nm)"
        vmin_plot: 0
        vmax_plot: 1
        vdiff_plot: 0.3
  modis_terra:
    type: modis_viirs
    product: MOD08_M3
    files: ${MODIS_DATA}/MOD08_M3/*.hdf
    variables:
      aod_550nm:
        units: "1"
  modis_aqua:
    type: modis_viirs
    product: MYD08_M3
    files: ${MODIS_DATA}/MYD08_M3/*.hdf
    variables:
      aod_550nm:
        units: "1"

pairs:
  merra2_vs_terra:
    x: { source: modis_terra, variable: aod_550nm }
    y: { source: merra2, variable: TOTEXTTAU }
  merra2_vs_aqua:
    x: { source: modis_aqua, variable: aod_550nm }
    y: { source: merra2, variable: TOTEXTTAU }

plots:
  terra_aod_spatial_bias:
    type: spatial_bias
    pairs: [merra2_vs_terra]
    title: "AOD Bias: MERRA2 - MODIS Terra"
  aqua_aod_spatial_bias:
    type: spatial_bias
    pairs: [merra2_vs_aqua]
    title: "AOD Bias: MERRA2 - MODIS Aqua"
  terra_aod_scatter:
    type: scatter
    pairs: [merra2_vs_terra]
    show_density: true
    title: "AOD: MERRA2 vs MODIS Terra"
    x_label: "MODIS Terra AOD"
    y_label: "MERRA-2 AOD"
  aqua_aod_scatter:
    type: scatter
    pairs: [merra2_vs_aqua]
    show_density: true
    title: "AOD: MERRA2 vs MODIS Aqua"
    x_label: "MODIS Aqua AOD"
    y_label: "MERRA-2 AOD"
  # Split per pair so each legend names its own MODIS source via geometry_label
  # (one timeseries spec covering both pairs would label both with one label).
  # No aggregate_dim: the timeseries renderer auto-averages all non-time dims
  # (lat, lon) -> a global-mean monthly series.
  terra_aod_timeseries:
    type: timeseries
    pairs: [merra2_vs_terra]
    title: "Global-Mean Monthly AOD - Terra"
    x_label: "MODIS Terra"
    y_label: "MERRA-2"
  aqua_aod_timeseries:
    type: timeseries
    pairs: [merra2_vs_aqua]
    title: "Global-Mean Monthly AOD - Aqua"
    x_label: "MODIS Aqua"
    y_label: "MERRA-2"

stats:
  output_table: true
  output_table_kwargs:
    precision: 3
  metrics: [N, MG, MD, MB, RMSE, R, NMB, NME, IOA]
