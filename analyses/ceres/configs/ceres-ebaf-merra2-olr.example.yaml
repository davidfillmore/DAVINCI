# CERES EBAF vs MERRA-2 monthly TOA OLR.
#
# Required environment variables:
#   CERES_ANALYSIS       path to analyses/ceres
#   CERES_EBAF_FILE      CERES_EBAF_*.nc file
#   MERRA2_MONTHLY_RAD   directory containing monthly MERRA-2 radiation files
analysis:
  start_time: "2025-10-01"
  end_time: "2025-12-31"
  output_dir: ${CERES_ANALYSIS}/output/ebaf-merra2-olr
  log_dir: ${CERES_ANALYSIS}/logs
  style:
    theme: ncar
    use_seaborn: true

sources:
  merra2:
    type: merra2
    role: model
    files: ${MERRA2_MONTHLY_RAD}/MERRA2_400.tavgM_2d_rad_Nx.20251?.nc4
    variables:
      LWTUP:
        units: W m-2
  ceres:
    type: ceres_ebaf
    role: obs
    files: ${CERES_EBAF_FILE}
    variables:
      toa_lw_all_mon:
        units: W m-2
        obs_min: 0
        obs_max: 500

pairs:
  merra2_vs_ebaf_olr:
    sources: [merra2, ceres]
    reference: ceres
    variables:
      merra2: LWTUP
      ceres: toa_lw_all_mon

plots:
  olr_bias:
    type: spatial_bias
    pairs: [merra2_vs_ebaf_olr]
    title: "TOA OLR Bias"
  olr_scatter:
    type: scatter
    pairs: [merra2_vs_ebaf_olr]
    show_density: true
    title: "TOA OLR"

stats:
  output_table: true
  metrics: [N, MB, RMSE, R, NMB, NME, IOA]
