# CERES SSF footprints vs MERRA-2 hourly TOA OLR.
#
# Required environment variables:
#   CERES_ANALYSIS     path to analyses/ceres
#   CERES_SSF_DIR      directory containing CER_SSF_NOAA20-FM6-VIIRS files
#   MERRA2_HOURLY_RAD  directory containing hourly MERRA-2 radiation files
analysis:
  start_time: "2026-04-01"
  end_time: "2026-04-03"
  output_dir: ${CERES_ANALYSIS}/output/ssf-merra2-olr
  log_dir: ${CERES_ANALYSIS}/logs
  style:
    theme: ncar
    use_seaborn: true

sources:
  merra2:
    type: merra2
    files: ${MERRA2_HOURLY_RAD}/MERRA2_400.tavg1_2d_rad_Nx.2026040?.nc4
    variables:
      LWTUP:
        units: W m-2
  ceres:
    type: ceres_ssf
    files: ${CERES_SSF_DIR}/CER_SSF_NOAA20-FM6-VIIRS_Edition1C_*.nc
    variables:
      toa_lw_up:
        units: W m-2
        valid_min: 0
        valid_max: 500

pairs:
  merra2_vs_ssf_olr:
    x: { source: ceres, variable: toa_lw_up }
    y: { source: merra2, variable: LWTUP }

plots:
  olr_bias:
    type: spatial_bias
    pairs: [merra2_vs_ssf_olr]
    title: "TOA OLR Bias"
  olr_scatter:
    type: scatter
    pairs: [merra2_vs_ssf_olr]
    show_density: true
    title: "TOA OLR"

stats:
  output_table: true
  metrics: [N, MB, RMSE, R, NMB, NME, IOA]
