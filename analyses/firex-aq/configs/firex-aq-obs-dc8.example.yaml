# FIREX-AQ DC-8 Observation-Only Analysis
#
# Loads DC-8 aircraft merge data (ICARTT) and produces flight track maps,
# vertical profiles, time series, and histograms for key biomass burning
# trace gas species.  No model section — triggers obs-only pipeline mode.
#
# Required environment variables:
#   FIREX_AQ_DATA     — Root directory containing FIREX-AQ aircraft merge files
#   FIREX_AQ_ANALYSIS — Analysis directory (parent of output/ and logs/)
#
# Usage:
#   export FIREX_AQ_DATA=~/Data/FIREX-AQ
#   export FIREX_AQ_ANALYSIS=$(pwd)
#   davinci-monet run analyses/firex-aq/configs/firex-aq-obs-dc8.example.yaml

analysis:
  start_time: "2019-07-22"
  end_time: "2019-09-06"
  output_dir: ${FIREX_AQ_ANALYSIS}/output/dc8
  log_dir: ${FIREX_AQ_ANALYSIS}/logs
  style:
    theme: ncar

obs:
  dc8:
    obs_type: icartt
    filename: ${FIREX_AQ_DATA}/aircraft/merge/firexaq-MRG60-DC8_MERGE_*_R2.ict
    variables:
      "O3":   { source_name: O3_CL }
      "CO":   { source_name: CO_DACOM }
      "NO":   { source_name: NO_CL }
      "NO2":  { source_name: NO2_CL }
      "CH2O": { source_name: CH2O_ISAF }
      "CO2":  { source_name: CO2_DACOM }

plots:
  dc8_track_co:
    type: obs_flight_track
    obs: dc8
    variable: "CO"
    title: "DC-8 Flight Tracks: CO (ppbv)"

  dc8_track_o3:
    type: obs_flight_track
    obs: dc8
    variable: "O3"
    title: "DC-8 Flight Tracks: O3 (ppbv)"

  dc8_profile_co:
    type: obs_vertical_profile
    obs: dc8
    variable: "CO"
    title: "DC-8 CO Vertical Profile"

  dc8_profile_o3:
    type: obs_vertical_profile
    obs: dc8
    variable: "O3"
    title: "DC-8 O3 Vertical Profile"

  dc8_profile_no:
    type: obs_vertical_profile
    obs: dc8
    variable: "NO"
    mode: binned
    title: "DC-8 NO Vertical Profile (binned)"

  dc8_ts_co:
    type: obs_timeseries
    obs: dc8
    variable: "CO"
    show_altitude: true
    title: "DC-8 CO Time Series"

  dc8_ts_o3:
    type: obs_timeseries
    obs: dc8
    variable: "O3"
    show_altitude: true
    title: "DC-8 O3 Time Series"

  dc8_hist_co:
    type: obs_histogram
    obs: dc8
    variable: "CO"
    title: "DC-8 CO Distribution"

  dc8_hist_o3:
    type: obs_histogram
    obs: dc8
    variable: "O3"
    title: "DC-8 O3 Distribution"

  dc8_hist_ch2o:
    type: obs_histogram
    obs: dc8
    variable: "CH2O"
    title: "DC-8 CH2O Distribution"

stats:
  metrics: [N, mean, median, std, min, max, p10, p25, p75, p90]
