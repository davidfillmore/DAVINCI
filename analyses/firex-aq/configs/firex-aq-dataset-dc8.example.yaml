# FIREX-AQ Dataset Evaluation - DC-8 Aircraft
#
# Dataset vs. geometry evaluation using DC-8 ICARTT merge data.
# Template: fill in dataset.files with your simulation output path.
#
# Required environment variables:
#   FIREX_AQ_DATA     — Root directory containing FIREX-AQ merge files
#   FIREX_AQ_ANALYSIS — Analysis directory (parent of output/ and logs/)
#
# Usage:
#   export FIREX_AQ_DATA=~/Data/FIREX-AQ
#   export FIREX_AQ_ANALYSIS=$(pwd)
#   davinci-monet run analyses/firex-aq/configs/firex-aq-dataset-dc8.example.yaml

analysis:
  start_time: "2019-07-22"
  end_time: "2019-09-06"
  output_dir: ${FIREX_AQ_ANALYSIS}/output/dataset-dc8
  log_dir: ${FIREX_AQ_ANALYSIS}/logs
  style:
    theme: ncar

sources:
  cam_firex:
    type: generic
    files: /path/to/dataset/output/*.nc    # <-- Replace with your dataset output
    radius_of_influence: 15000

    variables:
      O3:
        unit_scale: 1.0e9
        units: ppb
        ylabel_plot: "O$_3$ (ppb)"
        vmin_plot: 0
        vmax_plot: 120
        vdiff_plot: 40
      CO:
        unit_scale: 1.0e9
        units: ppb
        ylabel_plot: "CO (ppb)"
        vmin_plot: 0
        vmax_plot: 2000
        vdiff_plot: 500
      "NO":
        unit_scale: 1.0e9
        units: ppb
        ylabel_plot: "NO (ppb)"
        vmin_plot: 0
        vmax_plot: 20
        vdiff_plot: 10
      NO2:
        unit_scale: 1.0e9
        units: ppb
        ylabel_plot: "NO$_2$ (ppb)"
        vmin_plot: 0
        vmax_plot: 20
        vdiff_plot: 10

  dc8:
    type: icartt
    filename: ${FIREX_AQ_DATA}/aircraft/merge/firexaq-MRG60-DC8_MERGE_*_R2.ict
    variables:
      O3_CL:
        geometry_min: 0
        geometry_max: 200
        units: ppb
        ylabel_plot: "O$_3$ (ppb)"
        display_name: "O$_3$"
      CO_DACOM:
        geometry_min: 0
        geometry_max: 5000
        units: ppb
        ylabel_plot: "CO (ppb)"
        display_name: "CO"
      NO_CL:
        geometry_min: 0
        geometry_max: 50
        units: ppb
        ylabel_plot: "NO (ppb)"
        display_name: "NO"
      NO2_CL:
        geometry_min: 0
        geometry_max: 50
        units: ppb
        ylabel_plot: "NO$_2$ (ppb)"
        display_name: "NO$_2$"

pairs:
  cam_dc8_o3:
    sources: [cam_firex, dc8]
    geometry: dc8
    variables:
      cam_firex: O3
      dc8: O3_CL

  cam_dc8_co:
    sources: [cam_firex, dc8]
    geometry: dc8
    variables:
      cam_firex: CO
      dc8: CO_DACOM

  cam_dc8_no:
    sources: [cam_firex, dc8]
    geometry: dc8
    variables:
      cam_firex: "NO"
      dc8: NO_CL

  cam_dc8_no2:
    sources: [cam_firex, dc8]
    geometry: dc8
    variables:
      cam_firex: NO2
      dc8: NO2_CL

plots:
  dc8_o3_scatter:
    type: scatter
    pairs: [cam_dc8_o3]
    title: "O3: Dataset vs DC-8 Aircraft"
    split_by_flight: true
    min_points: 10

  dc8_co_scatter:
    type: scatter
    pairs: [cam_dc8_co]
    title: "CO: Dataset vs DC-8 Aircraft"
    split_by_flight: true
    min_points: 10

  dc8_o3_flight_timeseries:
    type: flight_timeseries
    pairs: [cam_dc8_o3]
    title: "O3: Dataset vs DC-8"
    split_by_flight: true
    min_points: 10

  dc8_co_flight_timeseries:
    type: flight_timeseries
    pairs: [cam_dc8_co]
    title: "CO: Dataset vs DC-8"
    split_by_flight: true
    min_points: 10

  dc8_o3_track_3d:
    type: track_map_3d
    pairs: [cam_dc8_o3]
    title: "O3 Bias: DC-8 3D Track"
    show_var: bias
    split_by_flight: true
    min_points: 10
    show_surface_map: false
    elev: 25
    azim: -60

  dc8_co_track_3d:
    type: track_map_3d
    pairs: [cam_dc8_co]
    title: "CO Bias: DC-8 3D Track"
    show_var: bias
    split_by_flight: true
    min_points: 10
    show_surface_map: false
    elev: 25
    azim: -60

stats:
  output_table: true
  output_table_kwargs:
    precision: 3
  metrics: [N, MG, MD, MB, RMSE, R, NMB, NME, IOA]
  per_flight: true
