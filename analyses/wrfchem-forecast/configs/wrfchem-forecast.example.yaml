# Daily WRF-Chem AQ Forecast Evaluation vs AirNow
#
# Replicates the legacy melodies-scripts/wrfchem.yaml pipeline against the
# operational AQ_WATCH WRF-Chem forecast. Pairs hourly forecast output with
# the previous day's AirNow surface observations and produces CONUS + EPA-
# region timeseries, spatial overlay, and spatial bias plots.
#
# Date substitution is via environment variables, not a Python wrapper. The
# qsub driver (scripts/qsub_wrfchem_daily.sh) exports YYYY, MM, DD from
# `date -d yesterday` and passes them through DAVINCI's ${VAR} expansion.
#
# Usage:
#   export YYYY=2025 MM=08 DD=01     # or use scripts/qsub_wrfchem_daily.sh
#   davinci-monet run analyses/wrfchem-forecast/configs/wrfchem-forecast.example.yaml

analysis:
  start_time: "${YYYY}-${MM}-${DD}"
  end_time:   "${YYYY}-${MM}-${DD} 23:00:00"
  output_dir: /glade/work/fillmore/Plots/AirNow_WRF-Chem-Forecast/${YYYY}/${MM}/${DD}
  log_dir:    /glade/work/fillmore/Plots/AirNow_WRF-Chem-Forecast/${YYYY}/${MM}/${DD}/logs
  style:
    theme: ncar

model:
  WRF-Chem:
    mod_type: wrfchem
    files: /glade/campaign/acom/acom-da/shawnh/AQ_WATCH/${YYYY}${MM}${DD}/wrf/wrfout_d01_${YYYY}-${MM}-${DD}_*
    mod_kwargs:
      mech: racm_esrl_vcp
    radius_of_influence: 12000

    mapping:
      airnow:
        "PM2.5": PM2_5_DRY
        OZONE: o3
      aeronet:
        aod_500nm: AOD2D_OUT

    # Variable-side unit scaling. With monetio's mech-aware reader (wrf-python
    # available) o3 is converted to ppb and PM2_5_DRY is already ug/m^3, so
    # unit_scale is 1. When the reader falls back to the xarray path (logged
    # with a clear warning) o3 stays in ppmv — switch `o3.unit_scale` to 1.0e3
    # to convert to ppb so the AirNow comparison is correct.
    variables:
      PM2_5_DRY:
        unit_scale: 1.0
        units: "ug/m3"
      o3:
        unit_scale: 1.0  # set to 1.0e3 if running with xarray-only fallback
        units: ppb
      AOD2D_OUT:
        unit_scale: 1.0
        units: "1"
        display_name: "WRF-Chem AOD"

    plot_kwargs:
      color: magenta
      marker: s
      linestyle: "-"

obs:
  airnow:
    obs_type: pt_sfc
    filename: /glade/work/fillmore/Data/AirNow/AirNow_${YYYY}${MM}${DD}.nc
    drop_unused_vars: true
    variables:
      "PM2.5":
        nan_value: -1.0
        units: "ug/m3"
        ylabel_plot: "PM2.5 (ug/m3)"
        vmin_plot: 0.0
        vmax_plot: 22.0
        vdiff_plot: 15.0
        nlevels_plot: 23
      OZONE:
        nan_value: -1.0
        units: ppb
        ylabel_plot: "Ozone (ppbv)"
        vmin_plot: 15.0
        vmax_plot: 55.0
        vdiff_plot: 20.0
        nlevels_plot: 21

  aeronet:
    obs_type: pt_sfc
    filename: /glade/work/fillmore/Data/AeroNet/AeroNet_${YYYY}${MM}${DD}.nc
    variables:
      aod_500nm:
        obs_min: 0.0
        obs_max: 5.0
        units: "1"
        ylabel_plot: "AOD (500 nm)"
        display_name: "AOD"
        vmin_plot: 0.0
        vmax_plot: 1.0
        vdiff_plot: 0.5
        nlevels_plot: 21

plots:

  timeseries_panels:
    type: timeseries
    data: [WRF-Chem_airnow]
    fig_kwargs:
      figsize: [12, 6]
    text_kwargs:
      fontsize: 18
    domain_type: [conus, epa_region, epa_region, epa_region, epa_region, epa_region, epa_region, epa_region, epa_region, epa_region, epa_region]
    domain_name: [CONUS,  R1,         R2,         R3,         R4,         R5,         R6,         R7,         R8,         R9,         R10]
    data_proc:
      rem_obs_nan: true
      ts_avg_window: H
      set_axis: true

  spatial_overlay_panels:
    type: spatial_overlay
    data: [WRF-Chem_airnow]
    fig_kwargs:
      states: true
      figsize: [10, 5]
    text_kwargs:
      fontsize: 14
    domain_type: [conus, epa_region, epa_region, epa_region, epa_region, epa_region, epa_region, epa_region, epa_region, epa_region, epa_region]
    domain_name: [CONUS,  R1,         R2,         R3,         R4,         R5,         R6,         R7,         R8,         R9,         R10]
    data_proc:
      rem_obs_nan: true
      set_axis: true

  spatial_bias_panels:
    type: spatial_bias
    data: [WRF-Chem_airnow]
    fig_kwargs:
      states: true
      figsize: [10, 5]
    text_kwargs:
      fontsize: 14
    domain_type: [conus, epa_region, epa_region, epa_region, epa_region, epa_region, epa_region, epa_region, epa_region, epa_region, epa_region]
    domain_name: [CONUS,  R1,         R2,         R3,         R4,         R5,         R6,         R7,         R8,         R9,         R10]
    data_proc:
      rem_obs_nan: true
      set_axis: true

  aeronet_scatter:
    type: scatter
    data: [WRF-Chem_aeronet]
    fig_kwargs:
      figsize: [7, 7]
    text_kwargs:
      fontsize: 14
    domain_type: [conus]
    domain_name: [CONUS]
    data_proc:
      rem_obs_nan: true
      set_axis: true

  aeronet_spatial_overlay:
    type: spatial_overlay
    data: [WRF-Chem_aeronet]
    fig_kwargs:
      states: true
      figsize: [10, 5]
    text_kwargs:
      fontsize: 14
    domain_type: [conus]
    domain_name: [CONUS]
    data_proc:
      rem_obs_nan: true
      set_axis: true

  aeronet_spatial_bias:
    type: spatial_bias
    data: [WRF-Chem_aeronet]
    fig_kwargs:
      states: true
      figsize: [10, 5]
    text_kwargs:
      fontsize: 14
    domain_type: [conus]
    domain_name: [CONUS]
    data_proc:
      rem_obs_nan: true
      set_axis: true

stats:
  metrics: [N, MB, RMSE, R, NMB, NME, IOA]
