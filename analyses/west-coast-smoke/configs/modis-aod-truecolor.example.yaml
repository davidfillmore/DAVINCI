# MODIS AOD on Terra True Color — Sep 9, 2020 West Coast Event
#
# Usage:
#   export WEST_COAST_SMOKE=$(pwd)
#   export WEST_COAST_SMOKE_DATA=~/Data/west-coast-smoke
#   davinci-monet run configs/modis-aod-truecolor.example.yaml

analysis:
  workflow: plume_sentinel
  start_time: "2020-09-09"
  end_time: "2020-09-09"
  output_dir: ${WEST_COAST_SMOKE}/output
  log_dir: ${WEST_COAST_SMOKE}/logs
  style:
    theme: ncar
    context: default

plume_sentinel:
  inputs:
    modis_terra_aod_event:
      type: modis_l2_aod
      files:
        - ${WEST_COAST_SMOKE_DATA}/modis_aod/MOD04_L2.A2020253.1905.061.2020254072344.hdf
        - ${WEST_COAST_SMOKE_DATA}/modis_aod/MOD04_L2.A2020253.1910.061.2020254072112.hdf
      variable: AOD_550_Dark_Target_Deep_Blue_Combined
      valid_range: [0.0, 5.0]
      grid:
        resolution: 0.25
        lon_range: [-180, 180]
        lat_range: [-90, 90]
        min_obs_count: 1

  plots:
    modis_aod_truecolor:
      type: truecolor_aod
      field: modis_terra_aod_event
      background:
        type: gibs_wmts
        layer: MODIS_Terra_CorrectedReflectance_TrueColor
        date: "2020-09-09"
      extent: [-130, -110, 30, 52]
      projection:
        type: lambert_conformal
        central_longitude: -120
      cmap: YlOrRd
      alpha: 0.7
      colorbar_label: "AOD 550 nm (DT+DB Combined)"
      title: "MODIS AOD (550 nm) on Terra True Color - Sep 9, 2020"
