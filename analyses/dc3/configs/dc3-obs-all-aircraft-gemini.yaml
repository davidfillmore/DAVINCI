# DC3 combined DC-8 + GV observation-only analysis (Gemini - Mac)
#
# Loads both DC-8 and GV aircraft merge data (ICARTT) and produces
# flight track maps and vertical profiles for each aircraft.
#
# No model section -- triggers obs-only pipeline mode.
#
# Usage:
#   davinci-monet run analyses/dc3/configs/dc3-obs-all-aircraft-gemini.yaml

analysis:
  start_time: "2012-05-18"
  end_time: "2012-06-30"
  output_dir: /Users/fillmore/EarthSystem/DAVINCI-MONET/analyses/dc3/output/all_aircraft
  log_dir: /Users/fillmore/EarthSystem/DAVINCI-MONET/analyses/dc3/logs
  style:
    theme: ncar

obs:
  dc8:
    obs_type: icartt
    filename: /Users/fillmore/Data/DC3/aircraft/merge/DC3-MRG10-DC8_MERGE_*_R10.ict
    variables:
      "NO":  { source_name: NO_ESRL }
      "O3":  { source_name: O3_ESRL }
      "CO":  { source_name: CO_DACOM }

  gv:
    obs_type: icartt
    filename: /Users/fillmore/Data/DC3/aircraft/merge/DC3-MRG10-GV_MERGE_*_R6.ict
    variables:
      "NO":  {}
      "O3":  {}
      "CO":  {}

plots:
  dc8_track_o3:
    type: obs_flight_track
    obs: dc8
    variable: "O3"
    title: "DC-8 O3 Flight Tracks"

  gv_track_o3:
    type: obs_flight_track
    obs: gv
    variable: "O3"
    title: "GV O3 Flight Tracks"

  dc8_profile_o3:
    type: obs_vertical_profile
    obs: dc8
    variable: "O3"
    mode: binned
    title: "DC-8 O3 Vertical Profile"

  gv_profile_o3:
    type: obs_vertical_profile
    obs: gv
    variable: "O3"
    mode: binned
    title: "GV O3 Vertical Profile"

stats:
  metrics: [N, mean, median, std, min, max, p10, p25, p75, p90]
