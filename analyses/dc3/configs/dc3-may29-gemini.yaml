# DC3 May 29, 2012 — Comprehensive case study (Gemini - Mac)
#
# Canonical Oklahoma supercell case with DC-8, GV, and OKLMA lightning data.
# Includes all existing plot types plus new LMA flash density maps.
#
# Aircraft: ~20:00 UTC May 29 – ~01:00 UTC May 30
# Lightning: Active 21:00 UTC May 29 – 05:00 UTC May 30, peak ~00:00 UTC
#
# Usage:
#   davinci-monet run analyses/dc3/configs/dc3-may29-gemini.yaml

analysis:
  start_time: "2012-05-29"
  end_time: "2012-05-30"
  output_dir: /Users/fillmore/EarthSystem/DAVINCI-MONET/analyses/dc3/output/may29
  log_dir: /Users/fillmore/EarthSystem/DAVINCI-MONET/analyses/dc3/logs
  style:
    theme: ncar

# ---------------------------------------------------------------------------
# Observations
# ---------------------------------------------------------------------------
obs:
  dc8:
    obs_type: icartt
    filename: /Users/fillmore/Data/DC3/aircraft/merge/DC3-MRG10-DC8_MERGE_20120529_R10.ict
    variables:
      "O3":  { source_name: O3_ESRL }
      "CO":  { source_name: CO_DACOM }
      "NO":  { source_name: NO_ESRL }
      "NO2": { source_name: NO2_TDLIF }
      "NOy": { source_name: NOy_ESRL }

  gv:
    obs_type: icartt
    filename: /Users/fillmore/Data/DC3/aircraft/merge/DC3-MRG10-GV_MERGE_20120529_R6.ict
    variables:
      "O3":  {}
      "CO":  {}
      "NO":  {}

  oklma:
    obs_type: lma
    filename: /Users/fillmore/Data/DC3/lightning/oklma/grids/OKLMA_20120529_*_flash_extent.nc
    variables:
      flash_extent:
        obs_min: 0
        units: "flashes/grid cell"

# ---------------------------------------------------------------------------
# Plots — DC-8 aircraft
# ---------------------------------------------------------------------------
plots:
  # Flight tracks (map, colored by variable)
  dc8_track_o3:
    type: obs_flight_track
    obs: dc8
    variable: "O3"
    title: "DC-8 Flight Track: O3 (ppbv) — 29 May 2012"

  dc8_track_co:
    type: obs_flight_track
    obs: dc8
    variable: "CO"
    title: "DC-8 Flight Track: CO (ppbv) — 29 May 2012"

  dc8_track_no:
    type: obs_flight_track
    obs: dc8
    variable: "NO"
    title: "DC-8 Flight Track: NO (ppbv) — 29 May 2012"

  # Vertical profiles
  dc8_profile_o3:
    type: obs_vertical_profile
    obs: dc8
    variable: "O3"
    mode: binned
    title: "DC-8 O3 Vertical Profile — 29 May 2012"

  dc8_profile_co:
    type: obs_vertical_profile
    obs: dc8
    variable: "CO"
    mode: binned
    title: "DC-8 CO Vertical Profile — 29 May 2012"

  dc8_profile_no:
    type: obs_vertical_profile
    obs: dc8
    variable: "NO"
    mode: binned
    title: "DC-8 NO Vertical Profile — 29 May 2012"

  # Time series
  dc8_ts_o3:
    type: obs_timeseries
    obs: dc8
    variable: "O3"
    show_altitude: true
    title: "DC-8 O3 Time Series — 29 May 2012"

  dc8_ts_co:
    type: obs_timeseries
    obs: dc8
    variable: "CO"
    show_altitude: true
    title: "DC-8 CO Time Series — 29 May 2012"

  # Histograms
  dc8_hist_o3:
    type: obs_histogram
    obs: dc8
    variable: "O3"
    title: "DC-8 O3 Distribution — 29 May 2012"

  dc8_hist_co:
    type: obs_histogram
    obs: dc8
    variable: "CO"
    title: "DC-8 CO Distribution — 29 May 2012"

  dc8_hist_noy:
    type: obs_histogram
    obs: dc8
    variable: "NOy"
    title: "DC-8 NOy Distribution — 29 May 2012"

  # ---------------------------------------------------------------------------
  # Plots — GV aircraft
  # ---------------------------------------------------------------------------
  gv_track_o3:
    type: obs_flight_track
    obs: gv
    variable: "O3"
    title: "GV Flight Track: O3 (ppbv) — 29 May 2012"

  gv_track_co:
    type: obs_flight_track
    obs: gv
    variable: "CO"
    title: "GV Flight Track: CO (ppbv) — 29 May 2012"

  gv_profile_o3:
    type: obs_vertical_profile
    obs: gv
    variable: "O3"
    mode: binned
    title: "GV O3 Vertical Profile — 29 May 2012"

  gv_profile_no:
    type: obs_vertical_profile
    obs: gv
    variable: "NO"
    mode: binned
    title: "GV NO Vertical Profile — 29 May 2012"

  gv_ts_o3:
    type: obs_timeseries
    obs: gv
    variable: "O3"
    show_altitude: true
    title: "GV O3 Time Series — 29 May 2012"

  gv_hist_o3:
    type: obs_histogram
    obs: gv
    variable: "O3"
    title: "GV O3 Distribution — 29 May 2012"

  gv_hist_co:
    type: obs_histogram
    obs: gv
    variable: "CO"
    title: "GV CO Distribution — 29 May 2012"

  # ---------------------------------------------------------------------------
  # Plots — LMA flash density maps (NEW — obs_lma_density renderer)
  # ---------------------------------------------------------------------------

  # Standalone hourly flash density maps
  lma_density:
    type: obs_lma_density
    obs: oklma
    variable: flash_extent
    time_agg: hourly
    cmap: YlOrRd
    title: "OKLMA Flash Extent Density — 29 May 2012"
    map:
      projection: LambertConformal
      features: [states]

  # Flash density with DC-8 and GV flight tracks overlaid
  lma_density_with_tracks:
    type: obs_lma_density
    obs: oklma
    variable: flash_extent
    time_agg: hourly
    cmap: YlOrRd
    title: "OKLMA Flash Density + Aircraft Tracks — 29 May 2012"
    flight_tracks:
      dc8: dc8
      gv: gv
    map:
      projection: LambertConformal
      features: [states]

  # NOTE: obs_timeseries and obs_histogram are not yet compatible with
  # 3D gridded LMA data. Those renderers expect 1D time series.

# ---------------------------------------------------------------------------
# Statistics
# ---------------------------------------------------------------------------
stats:
  metrics: [N, mean, median, std, min, max, p10, p25, p75, p90]
