# DC3 GV (HIAPER) observation-only analysis
#
# Loads GV aircraft merge data (ICARTT) and produces flight track maps,
# vertical profiles, time series, and histograms for key trace gas species.
#
# No model section -- triggers obs-only pipeline mode.
#
# Usage:
#   python scripts/run_obs_analysis.py dc3-obs-gv
#
# Required env vars:
#   DC3_DATA     - Root data directory (default: ~/Data/DC3)
#   DC3_ANALYSIS - Analysis directory (set automatically by run script)

analysis:
  start_time: "2012-05-18"
  end_time: "2012-06-30"
  output_dir: ${DC3_ANALYSIS}/output/gv
  log_dir: ${DC3_ANALYSIS}/logs
  style:
    theme: ncar

obs:
  gv:
    obs_type: icartt
    filename: ${DC3_DATA}/aircraft/merge/DC3-MRG10-GV_MERGE_*_R6.ict
    variables:
      NO:  {}
      NO2: {}
      O3:  {}
      CO:  {}

plots:
  gv_track_o3:
    type: obs_flight_track
    obs: gv
    variable: O3
    title: "GV Flight Tracks: O3 (ppbv)"

  gv_profile_o3:
    type: obs_vertical_profile
    obs: gv
    variable: O3
    title: "GV O3 Vertical Profile"

  gv_profile_no:
    type: obs_vertical_profile
    obs: gv
    variable: NO
    mode: binned
    title: "GV NO Vertical Profile (binned)"

  gv_ts_o3:
    type: obs_timeseries
    obs: gv
    variable: O3
    show_altitude: true
    title: "GV O3 Time Series"

  gv_hist_o3:
    type: obs_histogram
    obs: gv
    variable: O3
    title: "GV O3 Distribution"

stats:
  metrics: [N, mean, median, std, min, max, p10, p25, p75, p90]
