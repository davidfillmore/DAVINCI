# DC3 GV (HIAPER) observation-only analysis (Gemini - Mac)
#
# Loads GV aircraft merge data (ICARTT) and produces flight track maps,
# vertical profiles, time series, and histograms for key trace gas species.
#
# No model section -- triggers obs-only pipeline mode.
#
# Usage:
#   davinci-monet run analyses/dc3/configs/dc3-obs-gv-gemini.yaml

analysis:
  start_time: "2012-05-18"
  end_time: "2012-06-30"
  output_dir: /Users/fillmore/EarthSystem/DAVINCI-MONET/analyses/dc3/output/gv
  log_dir: /Users/fillmore/EarthSystem/DAVINCI-MONET/analyses/dc3/logs
  style:
    theme: ncar

obs:
  gv:
    obs_type: icartt
    filename: /Users/fillmore/Data/DC3/aircraft/merge/DC3-MRG10-GV_MERGE_*_R6.ict
    variables:
      "NO":  {}
      "NO2": {}
      "O3":  {}
      "CO":  {}

plots:
  gv_track_o3:
    type: obs_flight_track
    obs: gv
    variable: "O3"
    title: "GV Flight Tracks: O3 (ppbv)"

  gv_profile_o3:
    type: obs_vertical_profile
    obs: gv
    variable: "O3"
    title: "GV O3 Vertical Profile"

  gv_profile_no:
    type: obs_vertical_profile
    obs: gv
    variable: "NO"
    mode: binned
    title: "GV NO Vertical Profile (binned)"

  gv_ts_o3:
    type: obs_timeseries
    obs: gv
    variable: "O3"
    show_altitude: true
    title: "GV O3 Time Series"

  gv_hist_o3:
    type: obs_histogram
    obs: gv
    variable: "O3"
    title: "GV O3 Distribution"

stats:
  metrics: [N, mean, median, std, min, max, p10, p25, p75, p90]
