# DC3 OKLMA observation-only analysis (Gemini - Mac)
#
# Loads Oklahoma Lightning Mapping Array (OKLMA) gridded flash density
# data and produces spatial maps, time series, and histograms.
#
# No model section -- triggers obs-only pipeline mode.
#
# Data source: NCAR EOL dataset 353.202
# Benchmark case: 29-30 May 2012 Oklahoma supercell
#
# Usage:
#   davinci-monet run analyses/dc3/configs/dc3-obs-lma-gemini.yaml

analysis:
  start_time: "2012-05-29"
  end_time: "2012-05-30"
  output_dir: /Users/fillmore/EarthSystem/DAVINCI-MONET/analyses/dc3/output/lma
  log_dir: /Users/fillmore/EarthSystem/DAVINCI-MONET/analyses/dc3/logs
  style:
    theme: ncar

obs:
  oklma:
    obs_type: lma
    filename: /Users/fillmore/Data/DC3/lightning/oklma/*.nc
    variables:
      flash_extent_density:
        obs_min: 0
        units: "flashes/grid cell"
        ylabel_plot: "Flash Extent Density"
      source_density:
        obs_min: 0
        units: "sources/grid cell"
        ylabel_plot: "Source Density"
      flash_init_density:
        obs_min: 0
        units: "flashes/grid cell"
        ylabel_plot: "Flash Initiation Density"

plots:
  oklma_flash_timeseries:
    type: obs_timeseries
    obs: oklma
    variable: "flash_extent_density"
    title: "OKLMA Flash Extent Density"

  oklma_source_timeseries:
    type: obs_timeseries
    obs: oklma
    variable: "source_density"
    title: "OKLMA Source Density"

  oklma_flash_histogram:
    type: obs_histogram
    obs: oklma
    variable: "flash_extent_density"
    title: "OKLMA Flash Density Distribution"

  oklma_source_histogram:
    type: obs_histogram
    obs: oklma
    variable: "source_density"
    title: "OKLMA Source Density Distribution"

stats:
  metrics: [N, mean, median, std, min, max, p10, p25, p75, p90]
